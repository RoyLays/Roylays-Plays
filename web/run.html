<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roylays Plays</title>
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Roylays Plays" />
    <meta property="og:description" content="Playing a classic Java ME game in your browser." />
    <meta property="og:image" content="assets/logo.png" id="og-image-meta" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>
<style>
    *,
    *::before,
    *::after {
        box-sizing: border-box;
    }

    :root {
        --bg: #212121;
        --bg-dark: #1a1a1a;
        --surface: rgba(255, 255, 255, 0.04);
        --surface-border: rgba(255, 255, 255, 0.08);
        --accent-red: #ff0000;
        --accent-red-dim: rgba(255, 0, 0, 0.15);
        --accent-cyan: #00e5ff;
        --accent-cyan-dim: rgba(0, 229, 255, 0.12);
        --text-primary: #f1f1f1;
        --text-secondary: rgba(241, 241, 241, 0.7);
        --text-muted: rgba(241, 241, 241, 0.4);
        --font-body: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
        --transition: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html,
    body {
        height: 100%;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text-primary);
        overflow: hidden;
    }

    /* ===== BRANDING OVERLAY ===== */
    .brand-overlay {
        position: fixed;
        top: 12px;
        left: 14px;
        z-index: 250;
        /* Higher than sidebar */
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 6px 14px 6px 8px;
        transition: opacity 0.4s ease, border-color var(--transition), background 0.2s ease;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
    }

    .brand-overlay:hover {
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(45, 45, 45, 0.85);
    }

    .brand-overlay img {
        width: 28px;
        height: auto;
        border-radius: 5px;
    }

    .brand-overlay .brand-name {
        font-weight: 700;
        font-size: 0.82em;
        color: var(--text-primary);
        letter-spacing: 0.5px;
    }

    /* Scheme indicator badge */
    .scheme-indicator {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 6px 14px;
        font-size: 0.75em;
        font-weight: 600;
        color: var(--text-secondary);
        opacity: 0.7;
        transition: opacity 0.3s ease;
    }

    .scheme-indicator:hover {
        opacity: 1;
    }

    /* Controller status */
    .controller-status {
        position: fixed;
        top: 52px;
        right: 14px;
        z-index: 50;
        display: none;
        align-items: center;
        gap: 6px;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(46, 204, 113, 0.3);
        border-radius: 10px;
        padding: 6px 14px;
        font-size: 0.75em;
        font-weight: 600;
        color: #2ecc71;
    }

    .fullscreen-btn {
        position: fixed;
        top: 12px;
        right: 14px;
        z-index: 55;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text-primary);
        border-radius: 10px;
        width: 40px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1.05em;
        line-height: 1;
        transition: all var(--transition);
    }

    .fullscreen-btn:hover {
        border-color: rgba(255, 0, 0, 0.5);
        background: rgba(255, 0, 0, 0.12);
    }

    .controller-status::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2ecc71;
        animation: pulse 2s ease-in-out infinite;
    }

    .controller-status.visible {
        display: flex;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.4;
        }
    }

    #screen-area {
        background: linear-gradient(160deg, #1a1a1a 0%, #212121 50%, #181818 100%);
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #display {
        background-color: #000;
        zoom: 1;
        image-rendering: pixelated;
    }

    #display:focus {
        outline: none;
    }

    /* ===== ARCADE CABINET FRAME (fullscreen only) ===== */
    .arcade-frame {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        pointer-events: none;
        /* Arcade frame layout: left panel | center bezel | right panel */
    }

    .arcade-frame.active {
        display: flex;
        align-items: stretch;
    }

    /* Side panels with artwork */
    .arcade-side {
        flex: 0 0 auto;
        width: clamp(80px, 12vw, 180px);
        position: relative;
        overflow: hidden;
        pointer-events: none;
    }

    .arcade-side-left {
        background: linear-gradient(to right, #0a0a0a 0%, #111 100%);
        border-right: 3px solid;
        border-image: linear-gradient(to bottom, #888, #ccc, #888, #555, #888) 1;
    }

    .arcade-side-right {
        background: linear-gradient(to left, #0a0a0a 0%, #111 100%);
        border-left: 3px solid;
        border-image: linear-gradient(to bottom, #888, #ccc, #888, #555, #888) 1;
    }

    .arcade-side img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        opacity: 0.92;
        display: block;
    }

    /* Chrome inner edge highlight on side panels */
    .arcade-side-left::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 6px;
        background: linear-gradient(to right, transparent, rgba(200, 200, 200, 0.18), rgba(200, 200, 200, 0.06));
        pointer-events: none;
    }

    .arcade-side-right::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 6px;
        background: linear-gradient(to left, transparent, rgba(200, 200, 200, 0.18), rgba(200, 200, 200, 0.06));
        pointer-events: none;
    }

    /* Center column: top bezel + screen hole + bottom bezel */
    .arcade-center {
        flex: 1;
        display: flex;
        flex-direction: column;
        pointer-events: none;
    }

    .arcade-bezel-top {
        flex: 0 0 auto;
        height: clamp(30px, 5vh, 70px);
        background: linear-gradient(to bottom, #0d0d0d 0%, #181818 60%, #0f0f0f 100%);
        border-bottom: 2px solid;
        border-image: linear-gradient(to right, #444, #999, #ccc, #999, #444) 1;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Roylays logo text in top bezel */
    .arcade-bezel-top::after {
        content: 'ROYLAYS PLAYS';
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(8px, 1.1vw, 14px);
        font-weight: 800;
        letter-spacing: 4px;
        color: transparent;
        background: linear-gradient(90deg, #ff0040, #ff6600, #ffcc00, #ff6600, #ff0040);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: arcadeTextShine 3s linear infinite;
        text-shadow: none;
        filter: drop-shadow(0 0 6px rgba(255, 80, 0, 0.5));
    }

    @keyframes arcadeTextShine {
        0% {
            background-position: 0% center;
        }

        100% {
            background-position: 200% center;
        }
    }

    /* The transparent screen hole — lets the game show through */
    .arcade-screen-hole {
        flex: 1;
        position: relative;
        /* transparent — game canvas shows through */
        box-shadow:
            inset 0 0 0 2px rgba(0, 0, 0, 0.8),
            inset 0 0 30px rgba(0, 0, 0, 0.5);
    }

    /* Subtle scan-line overlay on screen area */
    .arcade-screen-hole::before {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(to bottom,
                transparent 0px,
                transparent 2px,
                rgba(0, 0, 0, 0.06) 2px,
                rgba(0, 0, 0, 0.06) 4px);
        pointer-events: none;
        z-index: 2;
    }

    /* CRT vignette glow */
    .arcade-screen-hole::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center,
                transparent 60%,
                rgba(0, 0, 0, 0.55) 100%);
        pointer-events: none;
        z-index: 3;
    }

    .arcade-bezel-bottom {
        flex: 0 0 auto;
        height: clamp(24px, 4vh, 60px);
        background: linear-gradient(to top, #0d0d0d 0%, #181818 60%, #0f0f0f 100%);
        border-top: 2px solid;
        border-image: linear-gradient(to right, #444, #999, #ccc, #999, #444) 1;
        position: relative;
    }

    /* Bottom joystick/button decorative divot */
    .arcade-bezel-bottom::after {
        content: '';
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 28px;
        height: 10px;
        border-radius: 50%;
        background: radial-gradient(ellipse at center, #333 0%, #111 100%);
        border: 1px solid #444;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
    }

    /* Corner rivets on side panels */
    .arcade-side-left::before,
    .arcade-side-right::before {
        content: '';
        position: absolute;
        top: 10px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ccc, #555);
        border: 1px solid #333;
        z-index: 5;
    }

    .arcade-side-left::before {
        right: 8px;
    }

    .arcade-side-right::before {
        left: 8px;
    }

    #loading {
        font-size: 1.1em;
        font-family: var(--font-body);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .loading-logo-container {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .loading-logo {
        width: 100px;
        height: auto;
        border-radius: 16px;
        filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.3));
        animation: logoPulse 2s ease-in-out infinite;
    }

    .loading-spinner-ring {
        position: absolute;
        inset: 0;
        border: 3px solid transparent;
        border-top-color: var(--accent-red);
        border-right-color: var(--accent-red);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    .loading-spinner-ring-outer {
        position: absolute;
        inset: -8px;
        border: 2px solid transparent;
        border-bottom-color: rgba(255, 255, 255, 0.2);
        border-left-color: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        animation: spin 1.5s linear infinite reverse;
    }

    .loading-text {
        font-size: 1.2em;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--text-primary);
    }

    .loading-subtext {
        font-size: 0.75em;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: fadeInOut 2s ease-in-out infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    @keyframes logoPulse {

        0%,
        100% {
            transform: scale(1);
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.3));
        }

        50% {
            transform: scale(1.05);
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.5));
        }
    }

    @keyframes fadeInOut {

        0%,
        100% {
            opacity: 0.4;
        }

        50% {
            opacity: 1;
        }
    }

    /* ===== ON-SCREEN KEYPAD — SHARED ===== */
    .keypad-part {
        background: linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
        border-top: 1px solid var(--surface-border);
        padding: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    .key-grid {
        display: grid;
        gap: 5px;
        width: 100%;
        height: 100%;
    }

    .left-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
    }

    .right-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
    }

    /* Individual Key Styles */
    .key {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
        color: var(--text-primary);
        border: 1px solid var(--surface-border);
        border-radius: 8px;
        font-family: var(--font-body);
        font-size: 1.4em;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        user-select: none;
        transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
        line-height: 1.1;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    .key span {
        font-size: 0.38em;
        font-weight: 400;
        margin-top: 2px;
        color: var(--text-muted);
        letter-spacing: 1px;
    }

    .key.active {
        background: var(--accent-red-dim);
        border-color: var(--accent-red);
        color: var(--accent-red);
        box-shadow: 0 0 16px rgba(255, 0, 0, 0.15);
        transform: scale(0.93);
    }

    .key.active span {
        color: rgba(255, 0, 0, 0.5);
    }

    .arrow-key {
        font-size: 1.8em;
    }

    .ok-key {
        font-size: 1.2em;
        color: var(--accent-red);
        border-color: rgba(255, 0, 0, 0.15);
    }

    .soft-key {
        font-size: 0.72em;
        color: var(--text-secondary);
        letter-spacing: 0.5px;
    }

    .small-key {
        width: 70%;
        height: 70%;
        font-size: 0.8em;
        align-self: end;
        padding: 2px;
        line-height: 1;
        color: var(--text-muted);
        border-color: rgba(255, 255, 255, 0.05);
    }

    .small-key-left {
        justify-self: left;
    }

    .small-key-right {
        justify-self: right;
    }

    /* ===== LANDSCAPE SPLIT PANELS ===== */
    #left-keys,
    #right-keys {
        display: none;
        position: absolute;
        bottom: 0;
    }

    #left-keys {
        left: 0;
        border-right: 1px solid var(--surface-border);
    }

    #right-keys {
        right: 0;
        border-left: 1px solid var(--surface-border);
    }

    body.kbd-landscape #left-keys,
    body.kbd-landscape #right-keys {
        display: flex;
        width: 220px;
        height: 100%;
    }

    body.kbd-landscape #left-keys .key-grid,
    body.kbd-landscape #right-keys .key-grid {
        max-height: 400px;
    }

    body.kbd-landscape #screen-area {
        left: 220px;
        right: 220px;
    }

    /* ===== PORTRAIT UNIFIED KEYPAD — Nokia-style ===== */
    #portrait-keypad {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 60;
        /* Deep charcoal, like Nokia body */
        background: linear-gradient(180deg, #1c1c1c 0%, #111111 100%);
        border-top: 2px solid rgba(255, 255, 255, 0.07);
        box-shadow: 0 -6px 32px rgba(0, 0, 0, 0.75), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        padding: 5px 7px calc(env(safe-area-inset-bottom, 0px) + 6px);
        box-sizing: border-box;
        flex-direction: column;
        gap: 4px;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    /* Thin separator between keypad sections */
    .portrait-keypad-sep {
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.08), transparent);
        flex-shrink: 0;
        margin: 1px 8px;
    }

    /* === Navigation Row (5-col) === */
    .portrait-nav-row {
        display: grid;
        gap: 4px;
        flex-shrink: 0;
        flex: 0 0 auto;
    }

    /* Top nav: L-SOFT | ↑ | OK (large) | ↓ | R-SOFT */
    .portrait-nav-row.top-nav {
        grid-template-columns: 1fr 1fr 1.3fr 1fr 1fr;
        height: 42px;
    }

    /* Bottom nav: CALL | ← | BACK | → | MAXIMIZE */
    .portrait-nav-row.bot-nav {
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
        height: 36px;
    }

    /* === Number Grid — fills remaining space, but yields 130px to the music card === */
    .portrait-num-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 4px;
        flex: 1 1 0;
        min-height: 120px;
        /* Prevent greedy growth that would squeeze out the music card */
        max-height: calc(100% - 42px - 36px - 140px - 20px);
    }

    /* Show portrait keypad in portrait orientation */
    @media (orientation: portrait) {
        /* Hide screen area in portrait to force rotation */
        #screen-area {
            display: none !important;
        }

        /* Hide landscape panels in portrait */
        #left-keys,
        #right-keys {
            display: none !important;
        }
    }

    /* Compact sizing for short/small screens (e.g. iPhone SE) */
    @media (orientation: portrait) and (max-height: 700px) {
        /* Portrait keypad is gone, no need for compact sizing here */
    }

    /* ===== MOBILE LANDSCAPE & FULLSCREEN OPTIMIZATIONS ===== */
    /* On mobile screens, hide side banners and top branding that waste space */
    @media (max-width: 1024px) {
        .brand-overlay,
        .scheme-indicator {
            display: none !important;
        }

        /* Hide arcade frame side panels and bezels on mobile to maximize screen real estate */
        .arcade-side,
        .arcade-bezel-top,
        .arcade-bezel-bottom {
            display: none !important;
        }

        /* Adjust arcade frame container if active */
        .arcade-frame.active {
            display: block; /* No flexbox since side panels are gone */
        }

        /* Let the game hole take full space and remove shadows/vignettes that dim the mobile screen */
        .arcade-screen-hole {
            box-shadow: none;
            background: transparent;
        }

        .arcade-screen-hole::before,
        .arcade-screen-hole::after {
            display: none !important;
        }

        /* Ensure game container fills the gap if frame is active */
        .arcade-center {
            height: 100%;
        }

        /* In landscape mode on mobile, ensure keys are not blocked and remove the black bezel */
        body.kbd-landscape #screen-area {
            left: clamp(200px, 30vw, 400px);
            right: clamp(200px, 30vw, 400px);
            background: transparent; /* Remove solid black background */
            box-shadow: none;
        }

        /* Optional: Add a subtle glow to the game area instead of a hard black border */
        body.kbd-landscape #display {
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
        }

        body.kbd-landscape #left-keys,
        body.kbd-landscape #right-keys {
            width: clamp(200px, 30vw, 400px);
            background: rgba(15, 15, 15, 0.98); /* Near opaque for solid look */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 150; 
            padding: 12px; 
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        /* Prominent Maximize button in mobile landscape */
        body.kbd-landscape .key[data-key="Maximize"] {
            background: var(--accent-red-dim);
            color: var(--accent-red);
            border-color: var(--accent-red);
            font-size: 1.4em;
        }

        /* Hide the top floating fullscreen button on small screens to avoid clutter */
        @media (max-width: 768px) {
            .fullscreen-btn {
                display: none !important;
            }
        }
        
        /* Larger buttons in mobile landscape */
        body.kbd-landscape .key {
            font-size: 1.25em;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
        }
        
        body.kbd-landscape .arrow-key {
            font-size: 1.6em;
        }

        body.kbd-landscape .key-grid {
            gap: 8px; /* More space between buttons */
        }
    }

    /* ===== ROTATION OVERLAY (PORTRAIT ONLY) ===== */
    .rotation-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #111;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: white;
        padding: 20px;
    }

    .rotation-overlay i {
        font-size: 4em;
        color: var(--accent-red);
        margin-bottom: 20px;
        animation: rotateIcon 2s infinite ease-in-out;
    }

    .rotation-overlay h2 {
        font-size: 1.8em;
        font-weight: 800;
        margin-bottom: 10px;
    }

    .rotation-overlay p {
        color: var(--text-secondary);
        font-size: 1.1em;
    }

    @keyframes rotateIcon {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(-90deg); }

    <!-- Branding: tap to return to launcher home -->

    <!-- Scheme Indicator Badge -->
