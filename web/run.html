<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roylays Plays</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>
<style>
    *,
    *::before,
    *::after {
        box-sizing: border-box;
    }

    :root {
        --bg: #212121;
        --bg-dark: #1a1a1a;
        --surface: rgba(255, 255, 255, 0.04);
        --surface-border: rgba(255, 255, 255, 0.08);
        --accent-red: #ff0000;
        --accent-red-dim: rgba(255, 0, 0, 0.15);
        --accent-cyan: #00e5ff;
        --accent-cyan-dim: rgba(0, 229, 255, 0.12);
        --text-primary: #f1f1f1;
        --text-secondary: rgba(241, 241, 241, 0.7);
        --text-muted: rgba(241, 241, 241, 0.4);
        --font-body: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
        --transition: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html,
    body {
        height: 100%;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text-primary);
        overflow: hidden;
    }

    /* ===== BRANDING OVERLAY ===== */
    .brand-overlay {
        position: fixed;
        top: 12px;
        left: 14px;
        z-index: 250;
        /* Higher than sidebar */
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 6px 14px 6px 8px;
        transition: opacity 0.4s ease, border-color var(--transition), background 0.2s ease;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
    }

    .brand-overlay:hover {
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(45, 45, 45, 0.85);
    }

    .brand-overlay img {
        width: 28px;
        height: auto;
        border-radius: 5px;
    }

    .brand-overlay .brand-name {
        font-weight: 700;
        font-size: 0.82em;
        color: var(--text-primary);
        letter-spacing: 0.5px;
    }

    /* Scheme indicator badge */
    .scheme-indicator {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 6px 14px;
        font-size: 0.75em;
        font-weight: 600;
        color: var(--text-secondary);
        opacity: 0.7;
        transition: opacity 0.3s ease;
    }

    .scheme-indicator:hover {
        opacity: 1;
    }

    /* Controller status */
    .controller-status {
        position: fixed;
        top: 52px;
        right: 14px;
        z-index: 50;
        display: none;
        align-items: center;
        gap: 6px;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(46, 204, 113, 0.3);
        border-radius: 10px;
        padding: 6px 14px;
        font-size: 0.75em;
        font-weight: 600;
        color: #2ecc71;
    }

    .fullscreen-btn {
        position: fixed;
        top: 12px;
        right: 14px;
        z-index: 55;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text-primary);
        border-radius: 10px;
        width: 40px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1.05em;
        line-height: 1;
        transition: all var(--transition);
    }

    .fullscreen-btn:hover {
        border-color: rgba(255, 0, 0, 0.5);
        background: rgba(255, 0, 0, 0.12);
    }

    .controller-status::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2ecc71;
        animation: pulse 2s ease-in-out infinite;
    }

    .controller-status.visible {
        display: flex;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.4;
        }
    }

    #screen-area {
        background: linear-gradient(160deg, #1a1a1a 0%, #212121 50%, #181818 100%);
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #display {
        background-color: #000;
        zoom: 1;
        image-rendering: pixelated;
    }

    #display:focus {
        outline: none;
    }

    /* ===== ARCADE CABINET FRAME (fullscreen only) ===== */
    .arcade-frame {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        pointer-events: none;
        /* Arcade frame layout: left panel | center bezel | right panel */
    }

    .arcade-frame.active {
        display: flex;
        align-items: stretch;
    }

    /* Side panels with artwork */
    .arcade-side {
        flex: 0 0 auto;
        width: clamp(80px, 12vw, 180px);
        position: relative;
        overflow: hidden;
        pointer-events: none;
    }

    .arcade-side-left {
        background: linear-gradient(to right, #0a0a0a 0%, #111 100%);
        border-right: 3px solid;
        border-image: linear-gradient(to bottom, #888, #ccc, #888, #555, #888) 1;
    }

    .arcade-side-right {
        background: linear-gradient(to left, #0a0a0a 0%, #111 100%);
        border-left: 3px solid;
        border-image: linear-gradient(to bottom, #888, #ccc, #888, #555, #888) 1;
    }

    .arcade-side img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        opacity: 0.92;
        display: block;
    }

    /* Chrome inner edge highlight on side panels */
    .arcade-side-left::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 6px;
        background: linear-gradient(to right, transparent, rgba(200, 200, 200, 0.18), rgba(200, 200, 200, 0.06));
        pointer-events: none;
    }

    .arcade-side-right::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 6px;
        background: linear-gradient(to left, transparent, rgba(200, 200, 200, 0.18), rgba(200, 200, 200, 0.06));
        pointer-events: none;
    }

    /* Center column: top bezel + screen hole + bottom bezel */
    .arcade-center {
        flex: 1;
        display: flex;
        flex-direction: column;
        pointer-events: none;
    }

    .arcade-bezel-top {
        flex: 0 0 auto;
        height: clamp(30px, 5vh, 70px);
        background: linear-gradient(to bottom, #0d0d0d 0%, #181818 60%, #0f0f0f 100%);
        border-bottom: 2px solid;
        border-image: linear-gradient(to right, #444, #999, #ccc, #999, #444) 1;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Roylays logo text in top bezel */
    .arcade-bezel-top::after {
        content: 'ROYLAYS PLAYS';
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(8px, 1.1vw, 14px);
        font-weight: 800;
        letter-spacing: 4px;
        color: transparent;
        background: linear-gradient(90deg, #ff0040, #ff6600, #ffcc00, #ff6600, #ff0040);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: arcadeTextShine 3s linear infinite;
        text-shadow: none;
        filter: drop-shadow(0 0 6px rgba(255, 80, 0, 0.5));
    }

    @keyframes arcadeTextShine {
        0% {
            background-position: 0% center;
        }

        100% {
            background-position: 200% center;
        }
    }

    /* The transparent screen hole — lets the game show through */
    .arcade-screen-hole {
        flex: 1;
        position: relative;
        /* transparent — game canvas shows through */
        box-shadow:
            inset 0 0 0 2px rgba(0, 0, 0, 0.8),
            inset 0 0 30px rgba(0, 0, 0, 0.5);
    }

    /* Subtle scan-line overlay on screen area */
    .arcade-screen-hole::before {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(to bottom,
                transparent 0px,
                transparent 2px,
                rgba(0, 0, 0, 0.06) 2px,
                rgba(0, 0, 0, 0.06) 4px);
        pointer-events: none;
        z-index: 2;
    }

    /* CRT vignette glow */
    .arcade-screen-hole::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center,
                transparent 60%,
                rgba(0, 0, 0, 0.55) 100%);
        pointer-events: none;
        z-index: 3;
    }

    .arcade-bezel-bottom {
        flex: 0 0 auto;
        height: clamp(24px, 4vh, 60px);
        background: linear-gradient(to top, #0d0d0d 0%, #181818 60%, #0f0f0f 100%);
        border-top: 2px solid;
        border-image: linear-gradient(to right, #444, #999, #ccc, #999, #444) 1;
        position: relative;
    }

    /* Bottom joystick/button decorative divot */
    .arcade-bezel-bottom::after {
        content: '';
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 28px;
        height: 10px;
        border-radius: 50%;
        background: radial-gradient(ellipse at center, #333 0%, #111 100%);
        border: 1px solid #444;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
    }

    /* Corner rivets on side panels */
    .arcade-side-left::before,
    .arcade-side-right::before {
        content: '';
        position: absolute;
        top: 10px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ccc, #555);
        border: 1px solid #333;
        z-index: 5;
    }

    .arcade-side-left::before {
        right: 8px;
    }

    .arcade-side-right::before {
        left: 8px;
    }

    #loading {
        font-size: 1.1em;
        font-family: var(--font-body);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .loading-logo-container {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .loading-logo {
        width: 100px;
        height: auto;
        border-radius: 16px;
        filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.3));
        animation: logoPulse 2s ease-in-out infinite;
    }

    .loading-spinner-ring {
        position: absolute;
        inset: 0;
        border: 3px solid transparent;
        border-top-color: var(--accent-red);
        border-right-color: var(--accent-red);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    .loading-spinner-ring-outer {
        position: absolute;
        inset: -8px;
        border: 2px solid transparent;
        border-bottom-color: rgba(255, 255, 255, 0.2);
        border-left-color: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        animation: spin 1.5s linear infinite reverse;
    }

    .loading-text {
        font-size: 1.2em;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--text-primary);
    }

    .loading-subtext {
        font-size: 0.75em;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: fadeInOut 2s ease-in-out infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    @keyframes logoPulse {

        0%,
        100% {
            transform: scale(1);
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.3));
        }

        50% {
            transform: scale(1.05);
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.5));
        }
    }

    @keyframes fadeInOut {

        0%,
        100% {
            opacity: 0.4;
        }

        50% {
            opacity: 1;
        }
    }

    /* ===== ON-SCREEN KEYPAD — SHARED ===== */
    .keypad-part {
        background: linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
        border-top: 1px solid var(--surface-border);
        padding: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    .key-grid {
        display: grid;
        gap: 5px;
        width: 100%;
        height: 100%;
    }

    .left-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
    }

    .right-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
    }

    /* Individual Key Styles */
    .key {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
        color: var(--text-primary);
        border: 1px solid var(--surface-border);
        border-radius: 8px;
        font-family: var(--font-body);
        font-size: 1.4em;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        user-select: none;
        transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
        line-height: 1.1;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    .key span {
        font-size: 0.38em;
        font-weight: 400;
        margin-top: 2px;
        color: var(--text-muted);
        letter-spacing: 1px;
    }

    .key.active {
        background: var(--accent-red-dim);
        border-color: var(--accent-red);
        color: var(--accent-red);
        box-shadow: 0 0 16px rgba(255, 0, 0, 0.15);
        transform: scale(0.93);
    }

    .key.active span {
        color: rgba(255, 0, 0, 0.5);
    }

    .arrow-key {
        font-size: 1.8em;
    }

    .ok-key {
        font-size: 1.2em;
        color: var(--accent-red);
        border-color: rgba(255, 0, 0, 0.15);
    }

    .soft-key {
        font-size: 0.72em;
        color: var(--text-secondary);
        letter-spacing: 0.5px;
    }

    .small-key {
        width: 70%;
        height: 70%;
        font-size: 0.8em;
        align-self: end;
        padding: 2px;
        line-height: 1;
        color: var(--text-muted);
        border-color: rgba(255, 255, 255, 0.05);
    }

    .small-key-left {
        justify-self: left;
    }

    .small-key-right {
        justify-self: right;
    }

    /* ===== LANDSCAPE SPLIT PANELS ===== */
    #left-keys,
    #right-keys {
        display: none;
        position: absolute;
        bottom: 0;
    }

    #left-keys {
        left: 0;
        border-right: 1px solid var(--surface-border);
    }

    #right-keys {
        right: 0;
        border-left: 1px solid var(--surface-border);
    }

    body.kbd-landscape #left-keys,
    body.kbd-landscape #right-keys {
        display: flex;
        width: 220px;
        height: 100%;
    }

    body.kbd-landscape #left-keys .key-grid,
    body.kbd-landscape #right-keys .key-grid {
        max-height: 400px;
    }

    body.kbd-landscape #screen-area {
        left: 220px;
        right: 220px;
    }

    /* ===== PORTRAIT UNIFIED KEYPAD — Nokia-style ===== */
    #portrait-keypad {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 60;
        /* Deep charcoal, like Nokia body */
        background: linear-gradient(180deg, #1c1c1c 0%, #111111 100%);
        border-top: 2px solid rgba(255, 255, 255, 0.07);
        box-shadow: 0 -6px 32px rgba(0, 0, 0, 0.75), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        padding: 5px 7px calc(env(safe-area-inset-bottom, 0px) + 6px);
        box-sizing: border-box;
        flex-direction: column;
        gap: 4px;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    /* Thin separator between keypad sections */
    .portrait-keypad-sep {
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.08), transparent);
        flex-shrink: 0;
        margin: 1px 8px;
    }

    /* === Navigation Row (5-col) === */
    .portrait-nav-row {
        display: grid;
        gap: 4px;
        flex-shrink: 0;
        flex: 0 0 auto;
    }

    /* Top nav: L-SOFT | ↑ | OK (large) | ↓ | R-SOFT */
    .portrait-nav-row.top-nav {
        grid-template-columns: 1fr 1fr 1.3fr 1fr 1fr;
        height: 42px;
    }

    /* Bottom nav: CALL | ← | BACK | → | MAXIMIZE */
    .portrait-nav-row.bot-nav {
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
        height: 36px;
    }

    /* === Number Grid — fills remaining space, but yields 130px to the music card === */
    .portrait-num-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 4px;
        flex: 1 1 0;
        min-height: 120px;
        /* Prevent greedy growth that would squeeze out the music card */
        max-height: calc(100% - 42px - 36px - 140px - 20px);
    }

    /* Show portrait keypad in portrait orientation */
    @media (orientation: portrait) {
        #portrait-keypad {
            display: flex;
            /* Height = keypad rows + 160px music card */
            height: min(52vmax, 480px);
            max-height: calc(100dvh - 120px);
        }

        /* Push screen-area up to not overlap — same value as keypad height above */
        #screen-area {
            bottom: min(52vmax, 480px);
        }

        /* Hide landscape panels in portrait */
        #left-keys,
        #right-keys {
            display: none !important;
        }
    }

    /* Compact sizing for short/small screens (e.g. iPhone SE) */
    @media (orientation: portrait) and (max-height: 700px) {
        #portrait-keypad {
            padding: 3px 5px 4px;
            gap: 2px;
            height: min(56vmax, 420px);
        }

        #screen-area {
            bottom: min(56vmax, 420px);
        }

        .portrait-nav-row.top-nav {
            height: 32px;
        }

        .portrait-nav-row.bot-nav {
            height: 26px;
        }

        .portrait-num-grid {
            gap: 2px;
            min-height: 110px;
        }

        .portrait-keypad-sep {
            margin: 0 6px;
        }

        #portrait-keypad .key {
            font-size: 1em;
        }

        #portrait-keypad .portrait-num-grid .key {
            font-size: 1.1em;
        }

        /* Shrink music card on small screens */
        .mobile-music-card {
            height: 100px;
        }

        .mobile-music-card .music-cover {
            width: 56px;
            height: 56px;
        }
    }

    #portrait-keypad .key {
        /* Nokia sculpted key look */
        background: linear-gradient(170deg, #2e2e2e 0%, #1a1a1a 55%, #141414 100%);
        border: 1px solid #3a3a3a;
        border-bottom: 2px solid #0a0a0a;
        border-radius: 8px;
        box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.09),
            inset 0 -1px 0 rgba(0, 0, 0, 0.5),
            0 2px 4px rgba(0, 0, 0, 0.6);
        color: #f0f0f0;
        font-family: var(--font-body);
        font-size: 1.25em;
        font-weight: 700;
        letter-spacing: -0.5px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        user-select: none;
        transition: background 0.08s ease, transform 0.08s ease, box-shadow 0.08s ease;
        line-height: 1;
        min-height: 0;
        padding: 2px 2px;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    /* ABC / DEF sub-labels */
    #portrait-keypad .key span {
        font-size: 0.33em;
        font-weight: 500;
        margin-top: 1px;
        color: rgba(200, 200, 200, 0.55);
        letter-spacing: 1px;
        line-height: 1;
    }

    /* Pressed state */
    #portrait-keypad .key.active {
        background: linear-gradient(170deg, #3a1010 0%, #220808 100%);
        border-color: var(--accent-red);
        border-bottom-color: #550000;
        color: #ff5555;
        box-shadow:
            inset 0 1px 0 rgba(255, 60, 60, 0.12),
            0 1px 2px rgba(0, 0, 0, 0.8);
        transform: translateY(1px);
    }

    #portrait-keypad .key.active span {
        color: rgba(255, 80, 80, 0.5);
    }

    /* ===== NAV CLUSTER SPECIAL STYLES ===== */

    /* OK button — prominent, red-accent */
    #portrait-keypad .key[data-key="Enter"] {
        background: linear-gradient(160deg, #3d1212 0%, #220808 100%);
        border-color: rgba(255, 0, 0, 0.35);
        border-bottom-color: #330000;
        color: var(--accent-red);
        font-size: 0.9em;
        font-weight: 800;
        letter-spacing: 1px;
        box-shadow:
            inset 0 1px 0 rgba(255, 80, 80, 0.15),
            0 0 10px rgba(200, 0, 0, 0.2),
            0 2px 4px rgba(0, 0, 0, 0.7);
    }

    /* Arrow keys — slightly lighter, no sub-label */
    #portrait-keypad .key[data-key^="Arrow"] {
        font-size: 1.5em;
        background: linear-gradient(170deg, #303030 0%, #1e1e1e 100%);
    }

    /* L-SOFT / R-SOFT */
    #portrait-keypad .key[data-key="F1"],
    #portrait-keypad .key[data-key="F2"] {
        background: linear-gradient(170deg, #1a2a2e 0%, #0d1a1e 100%);

<body>
    <!-- Branding: tap to return to launcher home -->
    <a href="./" class="brand-overlay" title="Back to home" aria-label="Back to home">

        <span class="brand-name">RoyLays</span>
    </a>

    <!-- Scheme Indicator Badge -->
    <div class="scheme-indicator" id="scheme-indicator">🎹 Classical</div>

    <!-- Fullscreen Toggle -->
    <button class="fullscreen-btn" id="fullscreen-btn" title="Enter fullscreen" aria-label="Enter fullscreen">⛶</button>

    <!-- Controller Status Indicator -->
    <div class="controller-status" id="controller-status">🎮 Controller Connected</div>

    <!-- Music Sidebar for Games -->
    <nav class="sidebar" id="music-sidebar">
        <div class="sidebar-music-player">
            <svg class="music-progress-container">
                <path class="music-progress-path" d="M0,0"></path>
            </svg>
            <div class="music-top">
                <div class="music-cover" id="music-cover"></div>
                <div class="music-cast-icon">

                </div>
            </div>
            <div class="music-info">
                <div class="music-title" id="music-title">Loading...</div>
                <div class="music-artist">Loading...</div>
            </div>
            <div class="music-controls">
                <button class="music-btn" id="music-prev"><i class="fas fa-step-backward"></i></button>
                <button class="music-btn play-pause" id="music-play-pause"><i class="fas fa-play"></i></button>
                <button class="music-btn" id="music-next"><i class="fas fa-step-forward"></i></button>
            </div>
        </div>
    </nav>

    <!-- Arcade Cabinet Frame (shown in fullscreen) -->
    <div class="arcade-frame" id="arcade-frame">
        <div class="arcade-side arcade-side-left">
            <img src="assets/arcade_left.png" alt="" draggable="false" />
        </div>
        <div class="arcade-center">
            <div class="arcade-bezel-top"></div>
            <div class="arcade-screen-hole"></div>

        </div>
        <div class="arcade-side arcade-side-right">
            <img src="assets/arcade_right.png" alt="" draggable="false" />
        </div>
    </div>

    <div id="screen-area">

        </div>

            <button data-key="Maximize" class="key" aria-label="Scale">⛶</button>
        </div>

        <!-- Thin divider between nav and numpad -->
        <div class="portrait-keypad-sep"></div>

        <!-- Numpad 1–9, *, 0, # -->
        <div class="portrait-num-grid">
            <button data-key="Digit1" class="key">1</button>
            <button data-key="Digit2" class="key">2<span>ABC</span></button>
            <button data-key="Digit3" class="key">3<span>DEF</span></button>
            <button data-key="Digit4" class="key">4<span>GHI</span></button>
            <button data-key="Digit5" class="key">5<span>JKL</span></button>
            <button data-key="Digit6" class="key">6<span>MNO</span></button>
            <button data-key="Digit7" class="key">7<span>PQRS</span></button>
            <button data-key="Digit8" class="key">8<span>TUV</span></button>
            <button data-key="Digit9" class="key">9<span>WXYZ</span></button>
            <button data-key="NumpadAsterisk" class="key">*</button>
            <button data-key="Digit0" class="key">0<span>+</span></button>
            <button data-key="NumpadDivide" class="key">#</button>
        </div>

        <!-- Thin divider before mobile music card -->
        <div class="portrait-keypad-sep"></div>

        <!-- Mobile Music Card: identical to desktop sidebar player, but rectangular (wider) -->
        <div class="mobile-music-card" id="mobile-music-card">

            <svg class="music-progress-container" id="mobile-music-progress-svg">
                <path class="music-progress-path" id="mobile-music-progress-path" d="M0,0"></path>

            <div class="mmc-left">
                <div class="music-cover" id="mobile-music-cover"></div>
            </div>
            <!-- Right: title, artist, controls -->
            <div class="mmc-right">

                    <div class="music-title" id="mobile-music-title">Loading...</div>
                    <div class="music-cast-icon"><i class="fas fa-rss"></i></div>
                </div>
                <div class="music-artist" id="mobile-music-artist">Loading...</div>
                <div class="music-controls">

                    <button class="music-btn play-pause" id="mobile-music-play-pause" aria-label="Play/Pause"><i class="fas fa-play"></i></button>
                    <button class="music-btn" id="mobile-music-next" aria-label="Next"><i class="fas fa-step-forward"></i></button>
                </div>
            </div>
        </div>
    </div>
