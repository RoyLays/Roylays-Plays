<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roylays Plays</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<style>
    *, *::before, *::after {
        box-sizing: border-box;
    }

    :root {
        --bg: #212121;
        --bg-dark: #1a1a1a;
        --surface: rgba(255, 255, 255, 0.04);
        --surface-border: rgba(255, 255, 255, 0.08);
        --accent-red: #ff0000;
        --accent-red-dim: rgba(255, 0, 0, 0.15);
        --accent-cyan: #00e5ff;
        --accent-cyan-dim: rgba(0, 229, 255, 0.12);
        --text-primary: #f1f1f1;
        --text-secondary: rgba(241, 241, 241, 0.7);
        --text-muted: rgba(241, 241, 241, 0.4);
        --font-body: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
        --transition: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
        height: 100%;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text-primary);
        overflow: hidden;
    }

    /* ===== BRANDING OVERLAY ===== */
    .brand-overlay {
        position: fixed;
        top: 12px;
        left: 14px;
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 6px 14px 6px 8px;
        transition: opacity 0.4s ease;
    }

    .brand-overlay img {
        width: 28px;
        height: auto;
        border-radius: 5px;
    }

    .brand-overlay .brand-name {
        font-weight: 700;
        font-size: 0.82em;
        color: var(--text-primary);
        letter-spacing: 0.5px;
    }

    /* Scheme indicator badge */
    .scheme-indicator {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 6px 14px;
        font-size: 0.75em;
        font-weight: 600;
        color: var(--text-secondary);
        opacity: 0.7;
        transition: opacity 0.3s ease;
    }

    .scheme-indicator:hover {
        opacity: 1;
    }

    /* Controller status */
    .controller-status {
        position: fixed;
        top: 12px;
        right: 14px;
        z-index: 50;
        display: none;
        align-items: center;
        gap: 6px;
        background: rgba(33, 33, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(46, 204, 113, 0.3);
        border-radius: 10px;
        padding: 6px 14px;
        font-size: 0.75em;
        font-weight: 600;
        color: #2ecc71;
    }

    .controller-status::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2ecc71;
        animation: pulse 2s ease-in-out infinite;
    }

    .controller-status.visible {
        display: flex;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
    }

    #screen-area {
        background: linear-gradient(160deg, #1a1a1a 0%, #212121 50%, #181818 100%);
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #display {
        background-color: #000;
        zoom: 1;
        image-rendering: pixelated;
    }

    #display:focus {
        outline: none;
    }

    #loading {
        font-size: 1.1em;
        font-family: var(--font-body);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .loading-logo-container {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .loading-logo {
        width: 100px;
        height: auto;
        border-radius: 16px;
        filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.3));
        animation: logoPulse 2s ease-in-out infinite;
    }

    .loading-spinner-ring {
        position: absolute;
        inset: 0;
        border: 3px solid transparent;
        border-top-color: var(--accent-red);
        border-right-color: var(--accent-red);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    .loading-spinner-ring-outer {
        position: absolute;
        inset: -8px;
        border: 2px solid transparent;
        border-bottom-color: rgba(255,255,255,0.2);
        border-left-color: rgba(255,255,255,0.2);
        border-radius: 50%;
        animation: spin 1.5s linear infinite reverse;
    }

    .loading-text {
        font-size: 1.2em;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--text-primary);
    }

    .loading-subtext {
        font-size: 0.75em;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: fadeInOut 2s ease-in-out infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @keyframes logoPulse {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.3)); }
        50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.5)); }
    }

    @keyframes fadeInOut {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
    }

    /* ===== ON-SCREEN KEYPAD ===== */
    .keypad-part {
        background: linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
        border-top: 1px solid var(--surface-border);
        padding: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    .key-grid {
        display: grid;
        gap: 5px;
        width: 100%;
        height: 100%;
    }

    .left-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
    }

    .right-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
    }

    /* Individual Key Styles */
    .key {
        background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
        color: var(--text-primary);
        border: 1px solid var(--surface-border);
        border-radius: 8px;
        font-family: var(--font-body);
        font-size: 1.4em;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        user-select: none;
        transition: all var(--transition);
        line-height: 1.1;
        -webkit-tap-highlight-color: transparent;
    }

    .key span {
        font-size: 0.38em;
        font-weight: 400;
        margin-top: 2px;
        color: var(--text-muted);
        letter-spacing: 1px;
    }

    .key.active {
        background: var(--accent-red-dim);
        border-color: var(--accent-red);
        color: var(--accent-red);
        box-shadow: 0 0 16px rgba(255, 0, 0, 0.15);
        transform: scale(0.95);
    }

    .key.active span {
        color: rgba(255, 0, 0, 0.5);
    }

    .arrow-key {
        font-size: 1.8em;
    }

    .ok-key {
        font-size: 1.2em;
        color: var(--accent-red);
        border-color: rgba(255, 0, 0, 0.15);
    }

    .small-key {
        width: 70%;
        height: 70%;
        font-size: 0.8em;
        align-self: end;
        padding: 2px;
        line-height: 1;
        color: var(--text-muted);
        border-color: rgba(255, 255, 255, 0.05);
    }

    .small-key-left {
        justify-self: left;
    }

    .small-key-right {
        justify-self: right;
    }

    #left-keys,
    #right-keys {
        display: none;
        position: absolute;
        bottom: 0;
    }

    #left-keys {
        left: 0;
        border-right: 1px solid var(--surface-border);
    }

    #right-keys {
        right: 0;
        border-left: 1px solid var(--surface-border);
    }

    body.kbd-portrait #left-keys,
    body.kbd-portrait #right-keys,
    body.kbd-landscape #left-keys,
    body.kbd-landscape #right-keys {
        display: flex;
    }

    body.kbd-portrait #left-keys,
    body.kbd-portrait #right-keys {
        width: 50%;
        height: 220px;
    }

    body.kbd-landscape #left-keys,
    body.kbd-landscape #right-keys {
        width: 220px;
        height: 100%;
    }

    body.kbd-landscape #left-keys .key-grid,
    body.kbd-landscape #right-keys .key-grid {
        max-height: 400px;
    }

    body.kbd-portrait #screen-area {
        bottom: 220px;
    }

    body.kbd-landscape #screen-area {
        left: 220px;
        right: 220px;
    }
</style>
<body>
    <!-- Branding Overlay -->
    <div class="brand-overlay">
        <img src="assets/logo.png" alt="RoyLays" />
        <span class="brand-name">RoyLays</span>
    </div>

    <!-- Scheme Indicator Badge -->
    <div class="scheme-indicator" id="scheme-indicator">🎹 Classical</div>

    <!-- Controller Status Indicator -->
    <div class="controller-status" id="controller-status">🎮 Controller Connected</div>

    <div id="screen-area">
        <canvas tabindex="0" id="display" style="display: none;"></canvas>
        <div id="loading">
            <div class="loading-logo-container">
                <div class="loading-spinner-ring-outer"></div>
                <div class="loading-spinner-ring"></div>
                <img src="assets/logo.png" alt="Roylays Plays" class="loading-logo" />
            </div>
            <div class="loading-text">Roylays Plays</div>
            <div class="loading-subtext" id="loading-status">Initializing...</div>
        </div>
    </div>
    <div id="left-keys" class="keypad-part">
        <div class="key-grid left-grid">
            <button data-key="Digit1" class="key">1</button>
            <button data-key="Digit2" class="key">2 <span>ABC</span></button>
            <button data-key="Digit3" class="key">3 <span>DEF</span></button>
            <button data-key="Digit4" class="key">4 <span>GHI</span></button>
            <button data-key="Digit5" class="key">5 <span>JKL</span></button>
            <button data-key="Digit6" class="key">6 <span>MNO</span></button>
            <button data-key="Digit7" class="key">7 <span>PQRS</span></button>
            <button data-key="Digit8" class="key">8 <span>TUV</span></button>
            <button data-key="Digit9" class="key">9 <span>WXYZ</span></button>
            <button data-key="NumpadAsterisk" class="key">*</button>
            <button data-key="Digit0" class="key">0 <span>+</span></button>
            <button data-key="NumpadDivide" class="key">#</button>
        </div>
    </div>
    <div id="right-keys" class="keypad-part">
         <div class="key-grid right-grid">
            <button data-key="F1" class="key">L</button>
            <button data-key="ArrowUp" class="key arrow-key" aria-label="Up">↑</button>
            <button data-key="F2" class="key">R</button>
            <button data-key="ArrowLeft" class="key arrow-key" aria-label="Left">←</button>
            <button data-key="Enter" class="key ok-key">OK</button>
            <button data-key="ArrowRight" class="key arrow-key" aria-label="Right">→</button>
            <button data-key="Escape" class="key small-key small-key-left">Esc</button>
            <button data-key="ArrowDown" class="key arrow-key" aria-label="Down">↓</button>
            <button data-key="Maximize" class="key small-key small-key-right" aria-label="Maximize">⛶</button>
        </div>
    </div>
    <script src="https://cjrtnc.leaningtech.com/20260317_2978/loader.js"></script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
